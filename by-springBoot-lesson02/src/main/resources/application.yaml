server:
  port: 8902

spring:
  application:
    name: by-spring-boot-devTools
  datasource:
    url: jdbc:mysql://localhost:3306/by_cloud_01?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # Thymeleaf配置
  thymeleaf:
    cache: false
    enabled: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

mybatis-plus:
  configuration:
    # 标准输出日志（控制台打印SQL）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  # JWT 签名密钥（HS256 建议不少于 32 字节；生产环境请替换为强随机并妥善保管）
  secret: by-lesson02-jwt-secret-key-at-least-256-bits-for-hs256
  # accessToken 过期时间（单位：秒；默认 7200 = 2 小时）
  access-token-expire: 7200
  # refreshToken 过期时间（单位：秒；默认 604800 = 7 天）
  refresh-token-expire: 604800
  # 携带 Token 的请求头名称（默认 Authorization）
  header: Authorization
  # Token 前缀（与请求头组合形如：Authorization: Bearer <token>）
  prefix: "Bearer "
  # 不需要登录校验的路径前缀（startsWith 匹配）
  skip-paths:
    - /byUser/login
    - /byUser/refreshToken
    - /byUser/logout
    - /doc.html
    - /webjars/
    - /v3/api-docs
    - /swagger-resources